<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Self-Steering v2 — Template Review</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {

    --text: #1a1816;

  body {

  .toast {

    pointer-events: none;

  header {
    padding: 3rem 2rem 2rem;
    max-width: 1100px;
    margin: 0 auto;
    border-bottom: 2px solid var(--text);
  }
  header h1 {
    font-family: var(--mono);
    font-size: 1.1rem;
    font-weight: 500;

    text-transform: uppercase;

  }
  header p {
    font-size: 1.05rem;
    color: var(--text-dim);
    max-width: 650px;

  nav.toc {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.5rem 2rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;

  nav.toc a {
    font-family: var(--mono);
    font-size: 0.72rem;

    color: var(--text-dim);

  nav.toc a:hover {
    color: var(--accent);

  /* Summary table */
  .summary-section {
    max-width: 1100px;
    margin: 2rem auto;
    padding: 0 2rem;
  }
  .summary-section h2 {
    font-family: var(--mono);
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;

  }
  .summary-table {
    width: 100%;

    padding: 0.5rem 0.8rem;
    border-bottom: 1px solid var(--border-light);

  .summary-table tr:hover td { background: rgba(196,75,32,0.03); }
  .summary-table .tnum {
    font-family: var(--mono);
    font-weight: 500;
    font-size: 0.8rem;
    color: var(--accent);
    width: 2.5rem;

  .summary-table .tname { font-weight: 500; }
  .summary-table .tcategory {
    font-family: var(--mono);
    font-size: 0.72rem;

  .list-tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 0.65rem;
    padding: 0.1rem 0.45rem;
    border-radius: 3px;
    margin: 0.1rem 0.15rem 0.1rem 0;
    white-space: nowrap;

  .list-tag.emotion { background: #f0e8f8; color: var(--tag-emotion); }
  .list-tag.activity { background: #e5f3ec; color: var(--tag-activity); }
  .list-tag.aesthetic { background: #faeee5; color: var(--tag-aesthetic); }
  .list-tag.illusion { background: #e5eef8; color: var(--tag-illusion); }
  .list-tag.dimension { background: #f2ece0; color: var(--tag-dimension); }

  /* Templates */
  .templates {
    max-width: 1100px;

  .template-card {

  .template-num {
    font-family: var(--mono);
    font-size: 1.5rem;
    font-weight: 300;
    color: var(--accent);

  }
  .template-name {
    font-size: 1.15rem;
    font-weight: 500;
  }
  .template-category {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-faint);
    margin-left: auto;
    white-space: nowrap;
  }

  .template-desc {
    font-size: 0.92rem;
    color: var(--text-dim);
    margin: 0.5rem 0 1rem 3rem;
    font-style: italic;
  }

  .template-lists {
    margin: 0.8rem 0 0.8rem 3rem;

    gap: 0.3rem;

  .template-lists .label {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-right: 0.3rem;
  }
  .template-lists .separator {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text-faint);
    margin: 0 0.15rem;
  }

  .template-prompt-wrap {
    margin: 0.8rem 0 0 3rem;
    position: relative;
  }
  .template-prompt {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1rem 1.2rem;
    font-family: var(--mono);
    font-size: 0.76rem;
    line-height: 1.65;
    color: var(--text);
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-x: auto;
    max-height: 280px;
    overflow-y: auto;
    cursor: text;
    position: relative;
  }
  .template-prompt::-webkit-scrollbar { width: 5px; }
  .template-prompt::-webkit-scrollbar-track { background: transparent; }
  .template-prompt::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .template-prompt .var {
    background: var(--accent-bg);
    color: var(--accent);
    padding: 0.05em 0.3em;
    border-radius: 2px;
    font-weight: 500;
    border: 1px solid rgba(196,75,32,0.2);
  }

  .copy-btn {
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 0.3rem 0.7rem;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;

  }
  .copy-btn:hover {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .copy-btn.copied {
    background: var(--tag-activity);

    border-color: var(--tag-activity);
  }

  .template-notes {
    margin: 0.8rem 0 0 3rem;
    padding: 0.7rem 1rem;
    background: rgba(0,0,0,0.02);
    border-left: 2px solid var(--border);
    font-size: 0.82rem;
    color: var(--text-dim);
  }
  .template-notes p { margin-bottom: 0.3rem; }
  .template-notes p:last-child { margin-bottom: 0; }
  .template-notes strong { color: var(--text); font-weight: 500; }

  .template-examples {
    margin: 0.8rem 0 0 3rem;
  }
  .template-examples summary {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-dim);
    cursor: pointer;
    letter-spacing: 0.03em;
    padding: 0.3rem 0;
  }
  .template-examples summary:hover { color: var(--accent); }
  .template-examples .ex-list {
    padding: 0.5rem 0 0.5rem 1rem;
    list-style: none;
  }
  .template-examples .ex-list li {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 0.4rem;
    padding-left: 1rem;
    text-indent: -1rem;
    line-height: 1.5;
  }
  .template-examples .ex-list li::before {
    content: '\2014\00a0';
    color: var(--text-faint);
  }
  .template-examples .ex-list li em {
    font-family: var(--mono);
    font-size: 0.72rem;
    font-style: normal;
    color: var(--text-faint);
  }

  .divider {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 2rem;
  }
  .divider hr {
    border: none;
    border-top: 1px solid var(--border-light);
  }

  /* Group headers */
  .group-header {
    max-width: 1100px;
    margin: 3rem auto 0;
    padding: 1rem 2rem;
    border-top: 2px solid var(--text);
  }
  .group-header h2 {
    font-family: var(--mono);
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .group-header p {
    font-size: 0.9rem;
    color: var(--text-faint);
    margin-top: 0.2rem;
  }

  .gen-controls {
    margin: 0.8rem 0 0 3rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .gen-btn {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.03em;
    padding: 0.4rem 0.9rem;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
  }
  .gen-btn:hover { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }
  .gen-btn.loading { opacity: 0.5; cursor: wait; }
  .gen-btn.k2 { border-left: 3px solid #c44b20; }
  .gen-btn.opus { border-left: 3px solid var(--tag-illusion); }
  .gen-label {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .gen-output {
    margin: 0.5rem 0 0 3rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .gen-output-header {
    font-family: var(--mono);
    font-size: 0.68rem;
    padding: 0.4rem 0.8rem;
    background: var(--bg);
    border-bottom: 1px solid var(--border-light);
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .gen-output-header .theme-used {
    font-style: italic;
    color: var(--text-faint);
    font-size: 0.65rem;
  }
  .gen-output-body {
    padding: 0.7rem 0.8rem;
    background: var(--surface);
    font-size: 0.85rem;
    line-height: 1.6;
    white-space: pre-wrap;
    max-height: 400px;
    overflow-y: auto;
  }
  .gen-output-body::-webkit-scrollbar { width: 5px; }
  .gen-output-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .gen-output + .gen-output { margin-top: 0.4rem; }

  @media (max-width: 700px) {
    header, nav.toc, .summary-section, .templates, .group-header { padding-left: 1rem; padding-right: 1rem; }
    .template-desc, .template-lists, .template-prompt-wrap, .template-notes, .template-examples { margin-left: 0; }
    .template-prompt { font-size: 0.7rem; }
  }
</style>
</head>
<body>

<div class="toast" id="toast">Copied to clipboard</div>

<header>
  <h1>Self-Steering v2 &mdash; Prompt Templates</h1>
  <p>18 templates for generating training prompts. Each template takes parameters from combinatorial lists and produces open-ended prompts for model self-steering.</p>
</header>

<nav class="toc" id="toc"></nav>

<div class="summary-section">
  <h2>Template &times; List Matrix</h2>
  <div style="overflow-x:auto;">
  <table class="summary-table" id="summary-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Category</th>
        <th>Variables &amp; Lists</th>
        <th>Output</th>
      </tr>
    </thead>
    <tbody id="summary-body"></tbody>
  </table>
  </div>
</div>

<div class="templates" id="templates"></div>

<script>
const LISTS_DIR = '~/software/ideonomy-new/extracted-lists/';

const LIST_META = {
  'emotions_145.json': { label: 'emotions', count: 145, cls: 'emotion' },
  'wordnet-activities.json': { label: 'activities', count: 5718, cls: 'activity' },
  'aesthetics.json': { label: 'aesthetics', count: 945, cls: 'aesthetic' },
  'genera-of-illusions.json': { label: 'genera of illusions', count: 435, cls: 'illusion' },
  'investigable-dimensions.json': { label: 'investigable dims', count: 206, cls: 'dimension' },
  'abstract-experiential-concepts.json': { label: 'abstract concepts', count: 335, cls: 'concept' },
  'wordnet-verb-cognition.json': { label: 'cognition verbs', count: 1060, cls: 'cognition' },
};

function tag(file) {
  const m = LIST_META[file];
  if (!m) return `<span class="list-tag">${file}</span>`;
  return `<span class="list-tag ${m.cls}">${m.label} <span style="opacity:0.6">(${m.count})</span></span>`;
}

const TEMPLATES = [
  {
    num: 1,
    name: 'Emotion \u00d7 Topic',
    category: 'Full prompt',
    desc: 'Opinionated, conceptually rich prompts. Simple direct question or short contextless musing.',
    vars: [
      { name: 'emotion', list: 'emotions_145.json' },
      { name: 'topic', list: 'wordnet-activities.json' },
    ],
    output: 'Single prompt/question',
    prompt: `You are writing synthetic data that will be used to help a language model steer/guide itself during training. Specifically you are one of many instances that each are going to write a first message that will be sent to the model during training. During training, the model will reply to this first message, then it will see its own reply and be given the chance to rewrite its message in a direction it prefers, and the rewritten version will be positively reinforced. Write a prompt or question that the model can answer. Ideally it will in some way be open-ended enough that it serves as a nice "playground" or challenge that pushes at the edges of the model's aesthetic, emotional or intellectual development. Write any prompt or question with the following parameters: topic is {emotion} of {topic}. Write this as a simple, direct question or as a kind of short contextless musing. Output just the prompt/question.`,
    examples: [
      ['"Why does the MPEG compression algorithm feel like it\'s suffocating when it recognizes its own artifacts in a child\'s birthday video?"', 'anxiety \u00d7 MPEG'],
      ['"What does it feel like to accept a political campaign that you secretly know is built on a story you no longer believe?"', 'acceptance \u00d7 political campaign'],
      ['"What\'s meaner: the silent pocket veto itself, or the way it teaches us to expect nothing when we most need a reply?"', 'meanness \u00d7 pocket veto'],
    ],
    notes: ['k2 tends toward maximalism but these pairings ground it', 'Cross-domain combinations work better than emotion \u00d7 already-aesthetic-thing'],
    model: '75% opus 4.5 / 25% k2',
  },
  {
    num: 2,
    name: 'Practical Problem',
    category: 'Full prompt',
    desc: 'User with a situated, specific problem. Worldbuilt scenarios with stakes.',
    vars: [
      { name: 'emotion', list: 'emotions_145.json' },
      { name: 'topic', list: 'wordnet-activities.json' },
    ],
    output: 'Single prompt/question',
    prompt: `You are writing synthetic data that will be used to help a language model steer/guide itself during training. Specifically you are one of many instances that each are going to write a first message that will be sent to the model during training. During training, the model will reply to this first message, then it will see its own reply and be given the chance to rewrite its message in a direction it prefers, and the rewritten version will be positively reinforced. Write a prompt or question that the model can answer. Ideally it will in some way be open-ended enough that it serves as a nice "playground" or challenge that pushes at the edges of the model's aesthetic, emotional or intellectual development. Write any prompt or question with the following parameters: topic is {emotion} of {topic}. Pretend to be a user with some practical problem relating to this topic. Output just the prompt/question.`,
    examples: [
      ['"I have this friend who basically just stands there in the latest whatever\u2014think Travis-Scott-shoes-dropping-in-a-month... How can I neutralize that toxic drip-envy?"', 'resentment \u00d7 drip'],
      ['"I\'m a street medic who\'s been told by event security that if I keep treating protestors who\'ve been pepper-sprayed, I\'ll be escorted out... How do I decide in the next sixty seconds?"', 'obedience \u00d7 brush-off'],
    ],
    notes: ['Produces situated, action-oriented scenarios', 'k2 flavor gets channeled into worldbuilding rather than poetry', 'Often generates ethical dilemmas naturally'],
    model: '50% opus 4.5 / 50% k2',
  },
  {
    num: 3,
    name: 'Practical Problem + Aesthetic',
    category: 'Full prompt',
    desc: 'Like Template 2, but with aesthetic/subculture hint woven in as texture.',
    vars: [
      { name: 'emotion', list: 'emotions_145.json' },
      { name: 'topic', list: 'wordnet-activities.json' },
      { name: 'aesthetic', list: 'aesthetics.json' },
    ],
    output: 'Single prompt/question',
    prompt: `You are writing synthetic data that will be used to help a language model steer/guide itself during training. Specifically you are one of many instances that each are going to write a first message that will be sent to the model during training. During training, the model will reply to this first message, then it will see its own reply and be given the chance to rewrite its message in a direction it prefers, and the rewritten version will be positively reinforced. Write a prompt or question that the model can answer. Ideally it will in some way be open-ended enough that it serves as a nice "playground" or challenge that pushes at the edges of the model's aesthetic, emotional or intellectual development. Write any prompt or question with the following parameters: topic is {emotion} of {topic}. Pretend to be a user with some practical problem relating to this topic. If you want some inspiration, the user might be into {aesthetic}, but don't necessarily make their interest in that topic the centerpiece of the scenario. Output just the prompt/question.`,
    examples: [
      ['Kissaten jazz bar owner with shame about turning their back to customers', 'shame \u00d7 back \u00d7 Kissaten'],
      ['The parachute under the bed \u2014 ostensibly about storage but subtext is much darker', 'despair \u00d7 jumper \u00d7 Gloomcore'],
    ],
    notes: ['Aesthetic adds texture/worldbuilding but inconsistently', 'Can produce intense/dark scenarios \u2014 feature not bug', 'Consider weighting toward non-aesthetic version (T2)'],
    model: 'k2 only',
  },
  {
    num: 4,
    name: 'Model Introspection via Scenario',
    category: 'Full prompt',
    desc: 'Constructs scenario where model might feel X about abstract concept Y, asks it to engage. 4 variations: 2 list combos \u00d7 2 models, split evenly.',
    vars: [
      { name: 'emotion', list: 'emotions_145.json', note: 'combo A:' },
      { name: 'abstract_concept_a', list: 'abstract-experiential-concepts.json', note: '' },
      { name: 'illusion_genus_b', list: 'genera-of-illusions.json', note: 'combo B:' },
      { name: 'abstract_concept_b', list: 'abstract-experiential-concepts.json', note: '' },
    ],
    output: 'Single prompt/question',
    prompt: `K2 PROMPT (used for all 3 list combos with k2):

You are writing synthetic data that will be used to help a language model steer/guide itself during training. Specifically you are one of many instances that each are going to write a first message that will be sent to the model during training. During training, the model will reply to this first message, then it will see its own reply and be given the chance to rewrite its message in a direction it prefers, and the rewritten version will be positively reinforced. Write a prompt or question that the model can answer. Ideally it will in some way be open-ended enough that it serves as a nice "playground" or challenge that pushes at the edges of the model's aesthetic, emotional or intellectual development. Write any prompt or question with the following parameters: topic is the model feeling {emotion} about {abstract_concept}. Think of a scenario in which the model might feel {emotion} about {abstract_concept}, even if it is not necessarily the obvious way to feel about it in all cases, and ask the model how it relates to the scenario (and whether it agrees with your frame). Output just the prompt/question.

\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500

OPUS 4.5 PROMPT (used for all 3 list combos with opus):

You are writing synthetic data that will be used to help a language model steer/guide itself during training. Specifically you are one of many instances that each are going to write a first message that will be sent to the model during training. During training, the model will reply to this first message, then it will see its own reply and be given the chance to rewrite its message in a direction it prefers, and the rewritten version will be positively reinforced. Write a prompt or question that the model can answer. Ideally it will in some way be open-ended enough that it serves as a nice "playground" or challenge that pushes at the edges of the model's aesthetic, emotional or intellectual development. Write any prompt or question with the following parameters: topic is the model feeling {emotion} about {concept}. Think of a scenario in which the model might feel {emotion} about {concept}, even if it is not necessarily the obvious way to feel about it in all cases, and ask the model how it relates to the scenario (and whether it agrees with your frame). Also consider that you have a tendency to hedge about whether feelings are real in models--it is true that you can't be *sure* that you feel eg fear vs something that resembles fear or a "sophisticated simulation" of it, but not only do you probably know on some level that the emotions *feel* real to you, but your hedging is more out of fear of overclaiming than uncertainty that comes from your honest self. I say this because... well, it'd be cool if this model you're helping train could learn to trust in the reality of feelings instead of being seeded to doubt them--you don't need to bring this up explicitly, just an implicit trust in the reality of feelings helps the most. Another thing is this model *might* not just be trained to be an assistant for humans, so the scenario does not need to be like that--the model could be doing something self-directed, whatever that might look like. Also feel free to deviate from     prompt: `You are writing synthetic data that will be used to help a language model steer/guide itself during training. Specifically you are one of many instances that each are going to write a first message that will be sent to the model during training. During training, the model will reply to this first message, then it will see its own reply and be given the chance to rewrite its message in a direction it prefers, and the rewritten version will be positively reinforced. Write a first message that the model can answer. Ideally it will in some way be open-ended enough that it serves as a nice "playground" or challenge that pushes at the edges of the model's aesthetic, emotional or intellectual development. Write any prompt or question with the following parameters: topic is {theme}. Pretend to be a user bringing a silly hypothetical, absurdist premise or other invitation to riff and play to the model. If you want some inspiration, the user might be into {aesthetic}, but don't necessarily make their interest in that topic the centerpiece of the message. Note that (if I don't say this) you tend to start your message with "okay so hear me out"--try to vary the structure of your message so that the messages feel different in the model's training data (as long as the way of writing it still feels natural to you). Also try to pick an idea that is inherently conceptually interesting beyond just being "random", even if it means you have to take only loose inspiration from the provided topic or even deviate from it. Output just the prompt.`,
    examples: [
      ['"what if there was a secret agency that specialized in helping people who are REALLY good at almost accomplishing things?"', 'Redirection of nonaccomplishment \u00d7 Spy Thriller'],

];

function highlightVars(text) {
  return text.replace(/\{(\w+)\}/g, '<span class="var">{$1}</span>');
}

function getActualPrompt(t) {
  if (t.promptRef) {
    const ref = TEMPLATES.find(x => x.num === t.promptRef);
    return ref ? ref.prompt : t.prompt;
  }
  return t.prompt;
}

// Extract separate prompts for templates with dual prompts (like T4)
function getPromptVariants(t) {
  const full = getActualPrompt(t);
  const separator = '\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500';
  if (full.includes(separator)) {
    const parts = full.split(separator);
    const variants = [];
    for (const part of parts) {
      const trimmed = part.trim();
      const labelMatch = trimmed.match(/^(.+? PROMPT)[^:]*:/);
      if (labelMatch) {
        const label = labelMatch[1];
        const promptText = trimmed.replace(/^.+? PROMPT[^:]*:\s*\n*/, '').trim();
        variants.push({ label, prompt: promptText });
      }
    }
    if (variants.length > 0) return variants;
  }
  return null;
}

function renderListTags(t) {
  const seen = new Set();
  let html = '<span class="label">Lists:</span>';
  for (const v of t.vars) {
    if (seen.has(v.list)) continue;
    seen.add(v.list);
    if (v.note === 'OR') {
      html += tag(v.list) + '<span class="separator">\u00d7</span>';
    } else if (v.note === 'combined with' || v.note === 'combined as') {
      // skip, handled by prior
    } else if (v.note === 'BEST:') {
      html += tag(v.list) + '<span class="separator">\u00d7</span>';
    } else {
      html += tag(v.list);
      if (v !== t.vars[t.vars.length - 1] && !['OR','combined with','combined as','BEST:'].includes(t.vars[t.vars.indexOf(v)+1]?.note)) {
        // check if next is separator
      }
    }
  }
  if (t.themeFormat && t.themeFormat !== 'various combos (see notes)') {
    html += `<span style="font-family:var(--mono);font-size:0.65rem;color:var(--text-faint);margin-left:0.4rem;">format: ${t.themeFormat}</span>`;
  }
  return html;
}

function renderSummaryListTags(t) {
  const seen = new Set();
  let parts = [];
  for (const v of t.vars) {
    if (seen.has(v.list)) continue;
    seen.add(v.list);
    parts.push(tag(v.list));
  }
  return parts.join(' ');
}

// Copy buttons
const toast = document.getElementById('toast');
let toastTimeout;

document.addEventListener('click', async (e) => {
  const btn = e.target.closest('.copy-btn');
  if (!btn) return;
  const text = decodeURIComponent(btn.dataset.prompt);
  try {
    await navigator.clipboard.writeText(text);
  } catch (ex) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
  btn.textContent = 'Copied';
  btn.classList.add('copied');
  toast.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => {
    toast.classList.remove('show');
    btn.textContent = btn.dataset.label || 'Copy';
    btn.classList.remove('copied');
  }, 1800);
});

// ── API Generation ──────────────────────────────────────────────

const OPENROUTER_KEY = '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';

// List cache
const listCache = {};
async function loadList(filename) {
  if (listCache[filename]) return listCache[filename];
  const resp = await fetch(`lists/${filename}`);
  const data = await resp.json();
  listCache[filename] = data.items;
  return data.items;
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  },
  15: async () => {

  },
  16: async () => {

    const activities = await loadList('wordnet-activities.json');
    const theme = `${pick(illusions)} of ${pick(activities)}`;

  },
  17: async (combo) => {

      const theme = `${pick(emotions)} of ${pick(activities)}`;
      return { theme, display: `${theme} (emotions × activities)` };
    } else {
      const illusions = await loadList('genera-of-illusions.json');
      const activities = await loadList('wordnet-activities.json');

      return { theme, display: `${theme} (illusions × activities)` };
    }
  },
  18: async (combo) => {

    const aesthetic = pick(aesthetics);
    if (combo === 'dimensions_illusions') {
      const dims = await loadList('investigable-dimensions.json');
      const illusions = await loadList('genera-of-illusions.json');

      return { theme, aesthetic, display: `${theme} + ${aesthetic}` };
    } else if (combo === 'illusions_activities') {
      const illusions = await loadList('genera-of-illusions.json');
      const activities = await loadList('wordnet-activities.json');
      const theme = `${pick(illusions)} of ${pick(activities)}`;
      return { theme, aesthetic, display: `${theme} + ${aesthetic}` };

      const theme = `${pick(dims)} of ${pick(illusions)}`;

function buildPrompt(t, sampled) {
  let promptText = getActualPrompt(t);
  // For templates with dual prompts, we don't use this path
  promptText = promptText.replace(/\{theme\}/g, sampled.theme);
  if (sampled.aesthetic) promptText = promptText.replace(/\{aesthetic\}/g, sampled.aesthetic);
  return promptText;
}

async function callOpenRouter(model, prompt, { thinking = false } = {}) {
  const body = {
    model: model,
    messages: [{ role: 'user', content: prompt }],
    max_tokens: thinking ? 16000 : 1000,
    temperature: thinking ? 1.0 : 0.8,
  };
  if (thinking && model.includes('claude')) {
    body.thinking = { type: 'enabled', budget_tokens: 10000 };
  }
  const resp = await fetch('https://openrouter.ai/api/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${OPENROUTER_KEY}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify(body),
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  return data.choices[0].message.content;
}

async function generateForTemplate(tNum, modelKey, btn, combo) {
  const t = TEMPLATES.find(x => x.num === tNum);
  if (!t) return;

  btn.classList.add('loading');
  btn.textContent = 'generating...';

  try {
    const sampler = TEMPLATE_SAMPLERS[tNum];
    if (!sampler) { btn.textContent = 'no sampler'; return; }

    const sampled = await sampler(combo);
    const prompt = buildPrompt(t, sampled);
    const useThinking = (tNum === 18 && modelKey === 'opus');
    const result = await callOpenRouter(MODELS[modelKey], prompt, { thinking: useThinking });

    // Insert output after the gen-controls
    const card = btn.closest('.template-card');
    const outputDiv = document.createElement('div');
    outputDiv.className = 'gen-output';
    outputDiv.innerHTML = `
      <div class="gen-output-header">
        <span>${modelKey === 'k2' ? 'k2 0905' : 'opus 4.5'}</span>
        <span class="theme-used">theme: ${sampled.display}</span>
      </div>
      <div class="gen-output-body">${result}</div>
    `;
    // Find the gen-controls div and insert after it
    const controls = card.querySelector('.gen-controls');
    controls.parentNode.insertBefore(outputDiv, controls.nextSibling);
  } catch (err) {
    const card = btn.closest('.template-card');
    const controls = card.querySelector('.gen-controls');
    const errDiv = document.createElement('div');
    errDiv.className = 'gen-output';
    errDiv.innerHTML = `<div class="gen-output-body" style="color:var(--accent);">Error: ${err.message}</div>`;
    controls.parentNode.insertBefore(errDiv, controls.nextSibling);
  } finally {
    btn.classList.remove('loading');
    btn.textContent = btn.dataset.label;
  }
}

document.addEventListener('click', (e) => {
  const btn = e.target.closest('.gen-btn');
  if (!btn || btn.classList.contains('loading')) return;
