max_steps = 20

[model]
name = "cosmicoptima/Prathamavatsa"
trust_remote_code = true

[model.ac]
freq = 1

[model.experimental.lora]
rank = 16
alpha = 256.0
dropout = 0.0
target_modules = [
    ".*\\.q_proj$",
    ".*\\.k_proj$",
    ".*\\.v_proj$",
    ".*\\.o_proj$",
    ".*\\.gate_up_proj$",
    ".*\\.down_proj$",
]
modules_to_save = [
    "lm_head$",
]

[data]
name = "cosmicoptima/3SgWfLwfa6"
soul_doc_path = "/workspace/soul_doc.txt"
seq_len = 2048
batch_size = 16

[optim]
lr = 7e-6
max_norm = 1.0

[wandb]
project = "rigel-distill"

[weights]
interval = 10
