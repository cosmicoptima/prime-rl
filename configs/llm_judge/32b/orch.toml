max_steps = 50
batch_size = 512
seq_len = 4096
rollouts_per_example = 4
mask_truncated_completions = false

[model]
name = "cosmicoptima/Prathamavatsa"

[wandb]
project = "diksha"

[wandb.log_extras]
samples = true
distributions = true
interval = 2

[wandb.log_extras.fixed_prompts]
num_prompts = 5
interval = 10
num_samples = 4
seed = 42

[[env]]
id = "vf-llm-judge"
[env.args]
judge_model = "moonshotai/kimi-k2-0905"
judge_api_base = "https://api.pinference.ai/api/v1"
openrouter_api_key_env = "PI_API_KEY"

[sampling]
max_tokens = 1024

[ckpt]
interval = 50
