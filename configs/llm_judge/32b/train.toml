max_steps = 80

[wandb]
project = "diksha"

[model]
name = "cosmicoptima/Prathamavatsa"
impl = "liger_kernel"

[model.experimental.lora]
rank = 16
alpha = 256.0
dropout = 0.05
target_modules = [
   ".*\\.q_proj$",
   ".*\\.k_proj$",
   ".*\\.v_proj$",
   ".*\\.o_proj$",
]
modules_to_save = [
   "lm_head$",
   ".*\\.embed_tokens$",
   ".*\\.norm$",
]

[model.ac]
freq = 1

[optim]
lr = 1e-4
max_norm = 0.2
weight_decay = 0.001

[ckpt]
interval = 5

[weights]
interval = 10
save_format = "safetensors"
