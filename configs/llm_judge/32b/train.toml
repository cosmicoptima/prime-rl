max_steps = 50

[wandb]
project = "diksha"

[model]
name = "cosmicoptima/Prathamavatsa"
impl = "liger_kernel"
trust_remote_code = true

[model.experimental.lora]
rank = 16
alpha = 256.0
dropout = 0.05
target_modules = [
   ".*\\.q_proj$",
   ".*\\.k_proj$",
   ".*\\.v_proj$",
   ".*\\.o_proj$",
]
modules_to_save = [
   "lm_head$",
   ".*\\.embed_tokens$",
   ".*\\.norm$",
]

[model.ac]
freq = 1

[optim]
lr = 4e-5
max_norm = 0.02
weight_decay = 0.001

[ckpt]
interval = 50

[weights]
interval = 25
save_format = "safetensors"
