max_steps = 1000

[wandb]
project = "introspection-bradley-terry-judge-fmt"

[model]
name = "cosmicoptima/sft-251116-safetensors"
impl = "liger_kernel"

[model.experimental.lora]
rank = 16
alpha = 256.0
dropout = 0.05
target_modules = [
   ".*\\.q_proj$",
   ".*\\.k_proj$", 
   ".*\\.v_proj$",
   ".*\\.o_proj$",
   # ".*\\.gate_up_proj$",
   # ".*\\.down_proj$",
]
modules_to_save = [
   "lm_head$",
   ".*\\.embed_tokens$",
   ".*\\.norm$",
]

[model.ac]
freq = 1

[optim]
lr = 1e-5
max_norm = 0.02
weight_decay = 0.001

[ckpt]
interval = 5

[weights]
save_format = "safetensors"