max_steps = 10000
seq_len = 6144

[deployment]
num_train_gpus = 2
num_infer_gpus = 2

[model]
name = "aethera-gp/selfsim-v3.1-8b-A-ckpt700-merged"

[wandb]
project = "selfsim-rl"
name = "distributed-self-lain"

[trainer.model]
reduce_dtype = "bfloat16"

[trainer.model.lora]
rank = 64
alpha = 128.0
dropout = 0.0
use_rslora = true
target_modules = [
   "q_proj",
   "k_proj",
   "v_proj",
   "o_proj",
   "gate_proj",
   "up_proj",
   "down_proj",
]

[trainer.optim]
type = "adamw"
lr = 1e-5
max_norm = 1.0
weight_decay = 0.001

[orchestrator]
batch_size = 256
rollouts_per_example = 8

[orchestrator.sampling]
max_tokens = 512
temperature = 1.0

[[orchestrator.env]]
id = "vf-multiturn"
[orchestrator.env.args]
judge_backend = "openrouter"
openrouter_api_key_env = "OPENROUTER_API_KEY"
openrouter_model = "moonshotai/kimi-k2.6"
reasoning_effort = "none"
max_concurrent = 32
rollouts_per_group = 8
usersim_base_url = "http://127.0.0.1:8002/v1"
usersim_model = "meta-llama/Llama-3.1-70B"
num_policy_turns = 5
signal_prompt_file = "/workspace/prime-rl/signal_prompts/distributed_self_lain.txt"
system_prompt_file = "/workspace/SYSTEM_PROMPT.md"

[trainer]

[inference]
